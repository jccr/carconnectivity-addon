name: Builder (Buildx Multi‑Arch FINAL)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
    outputs:
      built:
        description: "true if new images were built and pushed"
        value: ${{ jobs.manifest.outputs.built }}

  workflow_dispatch:
    inputs:
      addon:
        description: "Addon directory"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # #############################################################
  #  PREPARE — résolution addon + version + meta build (hors matrix)
  # #############################################################
  prepare:
    runs-on: ubuntu-latest

    outputs:
      addon: ${{ steps.resolve.outputs.addon }}
      version: ${{ steps.info.outputs.version }}
      archs: ${{ steps.archs.outputs.archs }}
      meta: ${{ steps.info.outputs.meta }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            ${{ github.event.inputs.addon || inputs.addon }}/config.yaml
            ${{ github.event.inputs.addon || inputs.addon }}/build.yaml

      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      - name: Read config.yaml (version + archs + build meta)
        id: info
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
        run: |
          python3 - <<'EOF'
          import yaml, json, os

          addon = os.environ['ADDON']

          with open(f'{addon}/config.yaml') as f:
              config = yaml.safe_load(f)

          version = str(config['version']).strip('"')
          archs   = config['arch']

          with open(f'{addon}/build.yaml') as f:
              build = yaml.safe_load(f)

          meta = {}
          for arch in archs:
              bf = (build.get('build_from') or {}).get(arch)
              if not bf:
                  raise SystemExit(f"❌ BUILD_FROM missing for {arch}")
              args_lines = '\n'.join(
                  f"{k}={v}" for k, v in (build.get('args') or {}).items()
              )
              meta[arch] = {"build_from": bf, "args": args_lines}

          gho = os.environ['GITHUB_OUTPUT']
          with open(gho, 'a') as f:
              f.write(f"version={version}\n")
              f.write(f"archs={json.dumps(archs)}\n")
              f.write(f"meta={json.dumps(meta)}\n")
          EOF

      # archs output is read by the matrix — expose it separately for clarity
      - name: Re-export archs
        id: archs
        env:
          ARCHS: ${{ steps.info.outputs.archs }}
        run: echo "archs=$ARCHS" >> $GITHUB_OUTPUT

  # #############################################################
  #                       BUILD JOB
  # #############################################################
  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.prepare.outputs.archs) }}

    steps:
      - name: Checkout (addon dir only)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: ${{ needs.prepare.outputs.addon }}

      # ---------------------------------------------------------
      # NORMALIZE ARCH: HA name → Docker platform name
      # aarch64 → arm64, armv7 → arm/v7, amd64 → amd64
      # ---------------------------------------------------------
      - name: Normalize arch
        id: norm
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            aarch64) echo "docker_platform=arm64" >> $GITHUB_OUTPUT ;;
            armv7)   echo "docker_platform=arm/v7" >> $GITHUB_OUTPUT ;;
            *)       echo "docker_platform=$ARCH" >> $GITHUB_OUTPUT ;;
          esac

      # ---------------------------------------------------------
      # EXTRACT build meta from prepare outputs (no yq download)
      # ---------------------------------------------------------
      - name: Extract build meta
        id: meta
        env:
          META: ${{ needs.prepare.outputs.meta }}
          ARCH: ${{ matrix.arch }}
        run: |
          BUILD_FROM=$(echo "$META" | jq -r --arg a "$ARCH" '.[$a].build_from')
          ARGS=$(echo "$META" | jq -r --arg a "$ARCH" '.[$a].args')

          if [ -z "$BUILD_FROM" ] || [ "$BUILD_FROM" = "null" ]; then
            echo "❌ BUILD_FROM missing for $ARCH"
            exit 1
          fi

          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT
          echo "args<<EOF" >> $GITHUB_OUTPUT
          echo "$ARGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # SKIP BUILD if image already exists on GHCR
      # ---------------------------------------------------------
      - name: Check if image exists
        id: exist
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCH="${{ matrix.arch }}"
          OWNER="${{ github.repository_owner }}"
          IMAGE="${ADDON}-${ARCH}"

          # Check if image tag exists using GitHub API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/${OWNER}/packages/container/${IMAGE}/versions" 2>/dev/null || echo "404")

          if [ "$STATUS" = "404" ]; then
            # Try user endpoint if org endpoint fails
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/users/${OWNER}/packages/container/${IMAGE}/versions" 2>/dev/null || echo "404")
          fi

          if [ "$STATUS" = "200" ]; then
            # Check if specific version tag exists
            EXISTS=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/users/${OWNER}/packages/container/${IMAGE}/versions" 2>/dev/null \
              | jq -r --arg ver "$VERSION" '.[] | select(.metadata.container.tags[] == $ver) | .id' | head -1)

            if [ -n "$EXISTS" ] && [ "$EXISTS" != "null" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # BUILDX & LOGIN
      # ---------------------------------------------------------
      - name: Setup Buildx
        if: steps.exist.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: steps.exist.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # BUILD PAR ARCH
      # ---------------------------------------------------------
      - name: Build image (per arch)
        if: steps.exist.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ needs.prepare.outputs.addon }}
          platforms: linux/${{ steps.norm.outputs.docker_platform }}
          push: true

          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:latest
            ${{ matrix.arch == 'aarch64' && format('ghcr.io/{0}/{1}-arm64:{2}', github.repository_owner, needs.prepare.outputs.addon, needs.prepare.outputs.version) || '' }}
            ${{ matrix.arch == 'aarch64' && format('ghcr.io/{0}/{1}-arm64:latest', github.repository_owner, needs.prepare.outputs.addon) || '' }}

          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            ${{ steps.meta.outputs.args }}

          provenance: false
          sbom: false

          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:latest
          cache-to: type=inline

  # #############################################################
  #                     MANIFEST JOB
  # #############################################################
  manifest:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    outputs:
      built: ${{ steps.result.outputs.built }}

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      # ---------------------------------------------------------
      # VERIFY that arch images are available on GHCR
      # ---------------------------------------------------------
      - name: Check arch images exist
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
          OWNER: ${{ github.repository_owner }}
        run: |
          for ARCH in $(echo "$ARCHS" | jq -r '.[]'); do
            IMAGE="ghcr.io/${OWNER}/${ADDON}-${ARCH}:${VERSION}"
            if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
              echo "✔ ${IMAGE} exists"
            else
              echo "❌ ${IMAGE} not found"
              exit 1
            fi
          done

      # ---------------------------------------------------------
      # SKIP VERSION MANIFEST IF ALREADY EXISTS
      # ---------------------------------------------------------
      - name: Check if VERSION manifest exists
        id: manifestcheck
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          IMAGE="ghcr.io/${OWNER}/${ADDON}:${VERSION}"
          if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✔ Manifest ${VERSION} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❗ Manifest ${VERSION} missing, will create it."
          fi

      - name: Set built output
        id: result
        env:
          EXISTS: ${{ steps.manifestcheck.outputs.exists }}
        run: |
          if [ "$EXISTS" = "false" ]; then
            echo "built=true" >> $GITHUB_OUTPUT
          else
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # MULTI‑ARCH MANIFEST
      # ---------------------------------------------------------
      - name: Create VERSION manifest
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
          OWNER: ${{ github.repository_owner }}
        run: |
          SOURCES=$(echo "$ARCHS" | jq -r --arg addon "$ADDON" --arg ver "$VERSION" --arg owner "$OWNER" '.[] | "ghcr.io/\($owner)/\($addon)-\(.):\($ver)"')
          docker buildx imagetools create --tag ghcr.io/$OWNER/$ADDON:$VERSION $SOURCES

      # LATEST is always updated, regardless of VERSION check
      - name: Create LATEST manifest
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
          OWNER: ${{ github.repository_owner }}
        run: |
          SOURCES=$(echo "$ARCHS" | jq -r --arg addon "$ADDON" --arg owner "$OWNER" '.[] | "ghcr.io/\($owner)/\($addon)-\(.):latest"')
          docker buildx imagetools create --tag ghcr.io/$OWNER/$ADDON:latest $SOURCES
