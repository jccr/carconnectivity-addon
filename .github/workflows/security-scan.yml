name: Security Scan (Trivy)

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    inputs:
      addon:
        description: 'Addon directory (e.g. carconnectivity-addon-edge)'
        required: true
        type: string
      blocking:
        description: 'Fail the job if vulnerabilities are found'
        type: boolean
        default: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      archs: ${{ steps.info.outputs.archs }}

    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          sparse-checkout: ${{ inputs.addon }}/config.yaml

      - name: Read archs from config.yaml
        id: info
        env:
          ADDON: ${{ inputs.addon }}
        run: |
          ARCHS=$(python3 -c "import yaml, json; c = yaml.safe_load(open('${ADDON}/config.yaml')); print(json.dumps(c['arch']))")
          echo "archs=$ARCHS" >> $GITHUB_OUTPUT

  trivy-scan:
    name: Trivy image scan (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.prepare.outputs.archs) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Normalize arch
        id: norm
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "docker_arch=arm64" >> $GITHUB_OUTPUT
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            echo "docker_arch=armv7" >> $GITHUB_OUTPUT
            echo "platform=linux/arm/v7" >> $GITHUB_OUTPUT
          else
            echo "docker_arch=${{ matrix.arch }}" >> $GITHUB_OUTPUT
            echo "platform=linux/${{ matrix.arch }}" >> $GITHUB_OUTPUT
          fi

      - name: Read image reference
        id: info
        env:
          ADDON: ${{ inputs.addon }}
          OWNER: ${{ github.repository_owner }}
        run: |
          VERSION=$(grep -oP '(?:version|VERSION):\s*\K[0-9]+\.[0-9]+\.[0-9]+' "$ADDON/config.yaml" | head -n 1)
          IMAGE="ghcr.io/${OWNER}/${ADDON}-${{ steps.norm.outputs.docker_arch }}:$VERSION"
          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.info.outputs.IMAGE }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ steps.norm.outputs.platform }}
        with:
          image-ref: ${{ steps.info.outputs.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ inputs.blocking && '1' || '0' }}
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.addon }}-${{ matrix.arch }}
